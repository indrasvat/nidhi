version: "2"

run:
  timeout: 3m
  go: "1.26"

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - ineffassign
    - misspell
    - revive
  settings:
    revive:
      rules:
        - name: exported
          disabled: true  # we'll enable this once APIs stabilize
  exclusions:
    rules:
      - path: _test\.go
        linters: [errcheck]

formatters:
  enable:
    - gofmt
    - goimports
