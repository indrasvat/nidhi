version: 2

before:
  hooks:
    - go mod tidy

builds:
  - main: ./cmd/nidhi
    binary: nidhi
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}
    mod_timestamp: "{{ .CommitTimestamp }}"

archives:
  - formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    files:
      - README.md
      - LICENSE

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "^ci:"
      - Merge pull request
      - Merge branch
  groups:
    - title: "New Features"
      regexp: '^.*?feat(\([[:word:]]+\))??!?:.+$'
      order: 0
    - title: "Bug Fixes"
      regexp: '^.*?fix(\([[:word:]]+\))??!?:.+$'
      order: 1
    - title: "Performance"
      regexp: '^.*?perf(\([[:word:]]+\))??!?:.+$'
      order: 2
    - title: "Other"
      order: 999

brews:
  - repository:
      owner: indrasvat
      name: homebrew-tap
    homepage: "https://github.com/indrasvat/nidhi"
    description: "Purpose-built TUI for git stash mastery"
    license: "MIT"
    install: |
      bin.install "nidhi"
    test: |
      system "#{bin}/nidhi", "--version"
    commit_author:
      name: goreleaserbot
      email: bot@goreleaser.com

release:
  github:
    owner: indrasvat
    name: nidhi
  prerelease: auto
  name_template: "{{ .ProjectName }} v{{ .Version }}"
  header: |
    ## nidhi v{{ .Version }}

    Purpose-built TUI for git stash mastery.
  footer: |
    ---
    **Full Changelog**: https://github.com/indrasvat/nidhi/compare/{{ .PreviousTag }}...{{ .Tag }}
