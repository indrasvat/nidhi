version: 2

before:
  hooks:
    - go mod tidy

builds:
  - main: ./cmd/nidhi
    binary: nidhi
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}
    mod_timestamp: "{{ .CommitTimestamp }}"

archives:
  - formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    files:
      - README.md
      - LICENSE

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "^ci:"
      - Merge pull request
      - Merge branch
  groups:
    - title: "New Features"
      regexp: '^.*?feat(\([[:word:]]+\))??!?:.+$'
      order: 0
    - title: "Bug Fixes"
      regexp: '^.*?fix(\([[:word:]]+\))??!?:.+$'
      order: 1
    - title: "Performance"
      regexp: '^.*?perf(\([[:word:]]+\))??!?:.+$'
      order: 2
    - title: "Other"
      order: 999

release:
  github:
    owner: indrasvat
    name: nidhi
  prerelease: auto
  name_template: "{{ .ProjectName }} v{{ .Version }}"
  header: |
    ## nidhi v{{ .Version }}

    Purpose-built TUI for git stash mastery.

    ### Quick install (macOS / Linux)

    ```bash
    curl -sSfL https://raw.githubusercontent.com/indrasvat/nidhi/main/install.sh | bash
    ```

    > **macOS Gatekeeper:** if you download the tarball directly, run
    > `xattr -d com.apple.quarantine nidhi` before first use. The
    > installer above does this automatically.
  footer: |
    ---
    **Full Changelog**: https://github.com/indrasvat/nidhi/compare/{{ .PreviousTag }}...{{ .Tag }}
