version: 2
builds:
  - main: ./cmd/nidhi
    binary: nidhi
    env: [CGO_ENABLED=0]
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}
archives:
  - formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
brews:
  - repository:
      owner: indrasvat
      name: homebrew-tap
    homepage: "https://github.com/indrasvat/nidhi"
    description: "Purpose-built TUI for git stash mastery"
